<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jemima AI | Double Your Conversions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim { animation: slideIn 0.3s ease forwards; }

        /* Clean YouTube Container */
        #video-container {
            background-color: #000;
            position: relative;
            overflow: hidden;
        }

        .youtube-iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            z-index: 10;
        }

        .youtube-iframe.active {
            opacity: 1;
            z-index: 20;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <nav class="flex items-center justify-between px-4 lg:px-12 py-4 lg:py-5 bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="flex items-center gap-2 font-extrabold text-lg lg:text-xl tracking-tighter">
            <span class="text-blue-600">✦</span> Jemima <span class="text-blue-600">AI</span>
        </div>
        <div class="hidden md:flex gap-8 text-xs font-bold text-slate-500 uppercase tracking-widest">
            <a href="#" class="hover:text-blue-600">Product</a>
            <a href="#" class="hover:text-blue-600">Pricing</a>
            <a href="#" class="hover:text-blue-600">Contact</a>
        </div>
        <button class="px-4 py-2 text-[10px] lg:text-xs font-black bg-blue-600 text-white rounded-none shadow-lg shadow-blue-100 uppercase tracking-widest">Free Audit</button>
    </nav>

    <main class="max-w-[1200px] mx-auto px-4 lg:px-6 pt-4 lg:pt-8 pb-8 lg:pb-16">
        
        <div class="flex flex-col items-center space-y-8 lg:space-y-12 mb-16 lg:mb-20">
            <div class="max-w-4xl text-center space-y-4">
                <div class="inline-block bg-slate-900 text-white text-[7px] lg:text-[8px] font-bold px-3 py-1 lg:px-5 lg:py-1.5 uppercase tracking-[0.3em] shadow-lg">
                    100% Lead Capture Engine
                </div>
                <h1 class="text-2xl md:text-3xl lg:text-4xl font-[800] leading-tight text-slate-950">
                    Add Jemima to your site. <br> <span class="text-blue-600">Increase Conversions.</span>
                </h1>
            </div>

            <div class="flex flex-col md:flex-row justify-center items-stretch gap-6 lg:gap-8 w-full max-w-5xl">
                
                <div class="w-full md:w-[45%] space-y-3">
                    <div id="video-container" class="relative aspect-video shadow-2xl border border-slate-200 overflow-hidden">
                        <div id="player-mount" class="absolute inset-0">
                            <!-- Dual iframes will be managed here -->
                        </div>

                        <!-- Transparent Interaction Layer -->
                        <div id="video-placeholder" class="absolute inset-0 z-30 bg-transparent cursor-pointer" onclick="activateAI()">
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 p-4 flex items-center justify-center gap-8 shadow-sm">
                        <div class="flex items-center gap-2 text-[9px] font-black uppercase tracking-wider">
                            <div class="w-8 h-8 bg-slate-950 flex items-center justify-center text-white"><i class="fas fa-phone-alt"></i></div>
                            <span>Call Now</span>
                        </div>
                        <div class="flex items-center gap-2 text-[9px] font-black uppercase tracking-wider">
                            <div class="w-8 h-8 bg-slate-950 flex items-center justify-center text-white"><i class="fas fa-sms"></i></div>
                            <span>SMS Now</span>
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-[45%] bg-white border border-slate-200 shadow-xl flex flex-col justify-between">
                    <div class="p-4 md:p-6 space-y-4">
                        <div class="flex items-center justify-between border-b pb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-blue-100 flex items-center justify-center text-blue-600 border relative">
                                    <i class="fas fa-robot text-[10px]"></i>
                                    <div class="absolute -bottom-0.5 -right-0.5 w-2 h-2 bg-emerald-500 rounded-none"></div>
                                </div>
                                <p class="text-[11px] font-black uppercase">Jemima AI</p>
                            </div>
                        </div>
                        <div id="chat-feed" class="space-y-3 h-[180px] md:h-[220px] overflow-y-auto chat-scroll pr-1 flex flex-col">
                            <div class="bg-blue-600 text-white p-3 text-[10px] md:text-[11px] font-medium leading-relaxed message-anim shadow-lg shadow-blue-50">
                                Hello! I'm Jemima. Select a question and I'll explain how I grow your business.
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-4 md:p-6 bg-slate-50/50 border-t space-y-3">
                        <div class="flex flex-col gap-1.5">
                            <button onclick="playVideoAnswer('howItWorks', this)" class="w-full py-2 text-[7px] md:text-[9px] font-black bg-white border text-slate-700 hover:text-blue-600 transition-all uppercase tracking-widest text-left px-3">
                                <i class="fas fa-play mr-2 text-[6px] text-blue-400"></i> How do you book my calendar?
                            </button>
                            <button onclick="playVideoAnswer('pricing', this)" class="w-full py-2 text-[7px] md:text-[9px] font-black bg-white border text-slate-700 hover:text-blue-600 transition-all uppercase tracking-widest text-left px-3">
                                <i class="fas fa-play mr-2 text-[6px] text-blue-400"></i> How much does it cost?
                            </button>
                            <button onclick="playVideoAnswer('results', this)" class="w-full py-2 text-[7px] md:text-[9px] font-black bg-white border text-slate-700 hover:text-blue-600 transition-all uppercase tracking-widest text-left px-3">
                                <i class="fas fa-play mr-2 text-[6px] text-blue-400"></i> Can I see your results?
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 bg-white border-t text-center grayscale opacity-30 mt-8">
        <div class="flex flex-wrap justify-center gap-8 text-xl font-black italic tracking-tighter">
            <span>TRADIEFLOW</span><span>CONSULT.IO</span><span>SAAS.CO</span><span>SPARK-TECH</span>
        </div>
    </footer>

    <script>
        const chatFeed = document.getElementById('chat-feed');
        const videoPlaceholder = document.getElementById('video-placeholder');
        const playerMount = document.getElementById('player-mount');
        
        const youtubeId = "gPP9ZaY_E-8";
        let players = [];
        let activeIndex = 0;
        let loopInterval = null;

        // Function to create a clean iframe
        function createPlayer(muted = true) {
            const iframe = document.createElement('iframe');
            iframe.className = "youtube-iframe";
            const muteParam = muted ? 1 : 0;
            iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=${muteParam}&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&playsinline=1&enablejsapi=1&version=3`;
            iframe.setAttribute('allow', 'autoplay; encrypted-media');
            return iframe;
        }

        function initSeamlessLoop() {
            // Clear any existing state
            clearInterval(loopInterval);
            playerMount.innerHTML = '';
            
            // Create two layers
            const p1 = createPlayer(true);
            const p2 = createPlayer(true);
            
            players = [p1, p2];
            playerMount.appendChild(p1);
            playerMount.appendChild(p2);
            
            p1.classList.add('active');
            
            // Start the swap interval (YouTube video is roughly 15s)
            // We swap slightly early (e.g., at 14.5s) to hide the reset
            loopInterval = setInterval(swapPlayers, 14500);
        }

        function swapPlayers() {
            const prevIndex = activeIndex;
            activeIndex = (activeIndex + 1) % 2;
            
            // Fade in new, fade out old
            players[activeIndex].classList.add('active');
            
            setTimeout(() => {
                players[prevIndex].classList.remove('active');
                // Reload the hidden iframe so it's ready for next loop
                const oldSrc = players[prevIndex].src;
                players[prevIndex].src = '';
                players[prevIndex].src = oldSrc;
            }, 800);
        }

        window.addEventListener('load', () => {
            initSeamlessLoop();
        });

        function activateAI() {
            clearInterval(loopInterval);
            videoPlaceholder.style.display = 'none';
            
            // Switch to a single high-quality unmuted player
            playerMount.innerHTML = '';
            const finalPlayer = createPlayer(false);
            finalPlayer.classList.add('active');
            playerMount.appendChild(finalPlayer);
        }

        function playVideoAnswer(type, el) {
            activateAI(); // Ensure we are in interaction mode

            const userMsg = document.createElement('div');
            userMsg.className = 'bg-slate-100 text-slate-700 p-3 text-[10px] md:text-[11px] font-bold self-end w-fit mb-2 border';
            userMsg.innerText = el.innerText.trim();
            chatFeed.appendChild(userMsg);

            const messages = {
                howItWorks: "I check your live calendar and secure the booking instantly.",
                pricing: "I handle all leads for a flat monthly fee. I typically pay for myself within 48 hours.",
                results: "Our clients see a 100% increase in captured leads."
            };
            addMessage(messages[type]);
        }

        function addMessage(text) {
            const typing = document.createElement('div');
            typing.className = 'bg-slate-50 text-slate-400 p-2 text-[9px] font-bold w-fit italic';
            typing.innerText = 'Jemima is responding...';
            chatFeed.appendChild(typing);
            chatFeed.scrollTop = chatFeed.scrollHeight;

            setTimeout(() => {
                typing.remove();
                const msg = document.createElement('div');
                msg.className = 'bg-blue-600 text-white p-3 text-[10px] md:text-[11px] font-medium leading-relaxed message-anim shadow-lg shadow-blue-50';
                msg.innerText = text;
                chatFeed.appendChild(msg);
                chatFeed.scrollTop = chatFeed.scrollHeight;
            }, 800);
        }
    </script>
</body>
</html>
