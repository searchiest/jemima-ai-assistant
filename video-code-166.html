<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jemima AI | Double Your Conversions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* --- VIDEO CORE CSS --- */
        #video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            border-radius: 4px;
        }

        /* Set base styles for all iframes in the container */
        #video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
            transition: opacity 0.4s ease-in-out;
        }

        #idle-player { z-index: 10; opacity: 1; }
        #interaction-player { z-index: 20; opacity: 0; pointer-events: none; }

        /* Layer Swap Logic triggered by JS */
        .video-active #interaction-player { opacity: 1; pointer-events: auto; }
        .video-active #idle-player { opacity: 0; pointer-events: none; }

        /* --- UI & CHAT CSS --- */
        #chat-feed div { font-size: 16px !important; line-height: 1.6; padding: 0.85rem !important; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-anim { animation: slideIn 0.3s ease forwards; }

        .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease; }
        .faq-item.active .faq-content { max-height: 1200px; padding-bottom: 2rem; }
        .faq-item.active .faq-icon { transform: rotate(180deg); }

        .typing-dot { width: 6px; height: 6px; background-color: #94a3b8; border-radius: 50%; display: inline-block; animation: typingPulse 1.4s infinite ease-in-out both; }
        @keyframes typingPulse { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        @media screen and (max-width: 768px) {
            input, select, textarea { font-size: 16px !important; }
            .faq-item button span { padding-right: 2rem; display: block; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <div id="modal-overlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-6 md:p-8 relative shadow-2xl border border-slate-100">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-300 hover:text-slate-600 transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div class="text-center mb-5">
                <div id="modal-tag" class="inline-block bg-[#c2155a]/10 text-[#c2155a] text-xs font-black px-4 py-1 uppercase tracking-[0.2em] mb-2.5">Step 1 of 1</div>
                <h3 id="modal-title" class="text-xl md:text-2xl font-[800] tracking-tighter text-slate-950">Get Your Free Audit</h3>
                <p id="modal-subtitle" class="text-slate-500 text-xs md:text-base mt-1">My team will manually review your site layout.</p>
            </div>
            <form onsubmit="handleFormSubmit(event)" class="space-y-4">
                <input type="text" id="form-name" required placeholder="Full Name" class="w-full border-b-2 border-slate-100 py-2 outline-none focus:border-[#c2155a] font-semibold">
                <input type="url" id="form-website" required placeholder="Website URL" class="w-full border-b-2 border-slate-100 py-2 outline-none focus:border-[#c2155a] font-semibold">
                <select id="form-traffic" required class="w-full border-b-2 border-slate-100 py-2 outline-none focus:border-[#c2155a] font-semibold bg-transparent">
                    <option value="" disabled selected>Monthly Traffic...</option>
                    <option value="0-1k">0 - 1,000</option>
                    <option value="1k-5k">1,000 - 5,000</option>
                    <option value="5k-20k">5,000 - 20,000</option>
                    <option value="20k+">20,000+</option>
                </select>
                <input type="email" id="form-email" required placeholder="Work Email" class="w-full border-b-2 border-slate-100 py-2 outline-none focus:border-[#c2155a] font-semibold">
                <button type="submit" id="submit-btn" class="w-full bg-[#c2155a] text-white py-4 font-black uppercase tracking-[0.2em] text-[11px] shadow-xl">Submit Audit Request</button>
            </form>
        </div>
    </div>

    <nav class="flex items-center justify-between px-4 lg:px-12 py-4 bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="flex items-center gap-2 font-extrabold text-xl tracking-tighter cursor-pointer" onclick="window.location.reload()">
            <img src="jemima-logo.png" alt="Logo" class="w-7 h-7 rounded-full" onerror="this.src='https://via.placeholder.com/150'">
            <span>Jemima</span>
        </div>
        <div class="hidden md:flex gap-8 text-[11px] font-bold text-slate-500 uppercase tracking-widest">
            <a href="#faq" class="hover:text-[#c2155a]">FAQs</a>
            <a href="javascript:void(0)" onclick="activateAI()" class="hover:text-[#c2155a]">How it Works</a>
        </div>
    </nav>

    <main class="max-w-[1200px] mx-auto px-4 pt-8 pb-16">
        <div class="flex flex-col md:flex-row gap-8 justify-center items-start">
            <div class="w-full md:w-[45%] space-y-4">
                <div id="video-container">
                    <iframe id="idle-player" 
                        src="https://player.mediadelivery.net/embed/646015/c05b369d-1529-4051-8773-79320393ec05?autoplay=true&loop=true&muted=true&controls=false" 
                        allow="autoplay; fullscreen"></iframe>
                    <iframe id="interaction-player" src="" allow="autoplay; fullscreen"></iframe>
                    <div id="video-placeholder" class="absolute inset-0 z-30 flex items-end justify-center pb-8 cursor-pointer" onclick="activateAI()">
                        <div class="bg-[#c2155a] px-6 py-3 rounded-full text-white text-[11px] font-black uppercase tracking-[0.2em] shadow-2xl">tap to interact</div>
                    </div>
                </div>

                <div class="p-6 bg-white border border-slate-200 shadow-sm space-y-4">
                    <h2 class="text-xs font-black uppercase tracking-[0.25em] text-[#c2155a]">Quick Answers</h2>
                    <div class="flex flex-col gap-2">
                        <button onclick="playVideoAnswer('bookings', this)" class="w-full py-4 text-[12px] font-black border text-left px-6 uppercase tracking-widest flex justify-between items-center group hover:bg-slate-50 transition-all">
                            <span><i class="fas fa-play-circle mr-3 text-[#c2155a]"></i>Will this actually get me more leads?</span>
                            <i class="fas fa-chevron-right text-xs opacity-20"></i>
                        </button>
                        <button onclick="playVideoAnswer('cost', this)" class="w-full py-4 text-[12px] font-black border text-left px-6 uppercase tracking-widest flex justify-between items-center group hover:bg-slate-50 transition-all">
                            <span><i class="fas fa-play-circle mr-3 text-[#c2155a]"></i>How much does it cost?</span>
                            <i class="fas fa-chevron-right text-xs opacity-20"></i>
                        </button>
                        <button onclick="playVideoAnswer('time', this)" class="w-full py-4 text-[12px] font-black border text-left px-6 uppercase tracking-widest flex justify-between items-center group hover:bg-slate-50 transition-all">
                            <span><i class="fas fa-play-circle mr-3 text-[#c2155a]"></i>Is this complicated?</span>
                            <i class="fas fa-chevron-right text-xs opacity-20"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="chat-container" class="w-full md:w-[45%] bg-white border border-slate-200 shadow-xl flex flex-col md:self-start">
                <div class="p-6 flex flex-col h-full">
                    <div id="chat-feed" class="h-[120px] transition-[height] duration-500 overflow-y-auto chat-scroll flex flex-col gap-3">
                        <div class="bg-[#c2155a]/5 text-slate-800 px-4 py-3 text-sm font-medium rounded-2xl rounded-tl-none">Hi I'm Jemima. Ask me anything!</div>
                    </div>
                    <form onsubmit="handleChatSubmit(event)" class="flex gap-2 border-t pt-4 mt-4">
                        <input type="text" id="user-chat-input" placeholder="Type a question..." class="flex-grow bg-slate-50 border px-4 py-3 outline-none focus:border-[#c2155a] rounded-sm">
                        <button type="submit" class="bg-[#c2155a] text-white w-12 flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
        </div>

        <section id="faq" class="py-20 border-t mt-20">
            <div class="max-w-4xl mx-auto space-y-8">
                <h2 class="text-3xl md:text-5xl font-black text-center tracking-tighter">Everything you need to know.</h2>
                
                <div class="faq-item border border-slate-200 bg-white">
                    <button onclick="toggleFaq(this)" class="w-full px-6 py-6 text-left flex justify-between items-center group">
                        <span class="font-black uppercase tracking-wider">Will this work with my current website?</span>
                        <i class="fas fa-chevron-down faq-icon transition-transform"></i>
                    </button>
                    <div class="faq-content px-6">
                        <div class="grid md:grid-cols-2 gap-8 items-start">
                            <p class="text-slate-700 font-medium">Yes, this integrates alongside your existing setup. No rebuild required.</p>
                            <div class="aspect-video bg-black rounded shadow-lg overflow-hidden">
                                <iframe class="w-full h-full" id="faq-vid-1" data-video-id="61d91a66-c2f8-4ad7-b584-f2aca6709f7c" allow="autoplay; fullscreen"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://assets.mediadelivery.net/playerjs/player-0.1.0.min.js"></script>
    <script>
        const BUNNY_BASE_URL = "https://player.mediadelivery.net/embed/646015/";
        const n8nChatWebhookUrl = "https://jemima-ai.app.n8n.cloud/webhook/bfda4753-0e08-4fdc-aeed-969bf9fd588c/chat"; 
        const n8nFormWebhookUrl = "https://jemima-ai.app.n8n.cloud/webhook/411d7c6e-d2ac-48cb-9385-54e3c32317ad";

        const mainExplainer = "61d91a66-c2f8-4ad7-b584-f2aca6709f7c"; 
        const faqVideoIds = { 
            bookings: "61d91a66-c2f8-4ad7-b584-f2aca6709f7c", 
            cost: "61d91a66-c2f8-4ad7-b584-f2aca6709f7c", 
            time: "61d91a66-c2f8-4ad7-b584-f2aca6709f7c",
            thanks: "61d91a66-c2f8-4ad7-b584-f2aca6709f7c"
        };

        const videoContainer = document.getElementById('video-container');
        const interactionPlayer = document.getElementById('interaction-player');
        const chatFeed = document.getElementById('chat-feed');
        const sessionId = "visitor_" + Math.random().toString(36).substr(2, 9);
        
        let activeHeroPlayer = null;
        let faqPlayers = {};
        let isInteracting = false;
        let loggedQuestions = new Set();

        // MAIN HERO VIDEO LOGIC
        function activateAI(vidGuid = mainExplainer) {
            isInteracting = true;
            // Add the class that swaps opacity in CSS
            videoContainer.classList.add('video-active');
            document.getElementById('video-placeholder').style.display = 'none';

            // Pause accordion players
            Object.values(faqPlayers).forEach(p => p.pause());

            const t = new Date().getTime();
            interactionPlayer.src = `${BUNNY_BASE_URL}${vidGuid}?autoplay=true&muted=false&controls=false&t=${t}`;

            activeHeroPlayer = new playerjs.Player(interactionPlayer);
            activeHeroPlayer.on('ended', () => resetToLoop());
        }

        function resetToLoop() {
            isInteracting = false;
            videoContainer.classList.remove('video-active');
            setTimeout(() => {
                interactionPlayer.src = ""; 
                document.getElementById('video-placeholder').style.display = 'flex';
                activeHeroPlayer = null;
            }, 400);
        }

        // HERO FAQ BUTTONS
        function playVideoAnswer(type, el) { 
            const vidGuid = faqVideoIds[type];
            if (vidGuid) {
                activateAI(vidGuid);
                expandChatWindow();
                if (!loggedQuestions.has(type)) {
                    loggedQuestions.add(type);
                    addMessageToFeed(el.innerText.trim(), 'user');
                }
            }
        }

        // ACCORDION FAQ LOGIC
        function toggleFaq(button) {
            const item = button.closest('.faq-item');
            const wasActive = item.classList.contains('active');
            const iframe = item.querySelector('iframe');
            const vGuid = iframe?.getAttribute('data-video-id');

            document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('active'));
            Object.values(faqPlayers).forEach(p => p.pause());

            if (!wasActive) {
                item.classList.add('active');
                if (isInteracting) resetToLoop();
                if (iframe && vGuid) {
                    if (!iframe.src || iframe.src.includes('about:blank')) {
                        iframe.src = `${BUNNY_BASE_URL}${vGuid}?autoplay=true&muted=false&controls=true`;
                        faqPlayers[iframe.id] = new playerjs.Player(iframe);
                    } else {
                        faqPlayers[iframe.id].play();
                    }
                }
            }
        }

        // UI & FORM
        function expandChatWindow() { chatFeed.classList.remove('h-[120px]'); chatFeed.classList.add('h-[400px]'); }
        function addMessageToFeed(text, type = 'bot') {
            const msg = document.createElement('div');
            msg.className = type === 'bot' ? 'bg-[#c2155a]/5 text-slate-800 border px-4 py-3 rounded-2xl rounded-tl-none message-anim' : 'bg-white text-slate-700 border self-end px-4 py-3 rounded-2xl rounded-tr-none shadow-sm message-anim';
            msg.innerText = text; chatFeed.appendChild(msg); chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        async function handleChatSubmit(e) {
            e.preventDefault();
            const input = document.getElementById('user-chat-input');
            const text = input.value.trim();
            if(!text) return;
            input.value = ''; addMessageToFeed(text, 'user');
            try {
                const res = await fetch(n8nChatWebhookUrl, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: text, sessionId}) });
                const data = await res.json();
                addMessageToFeed(data.output || "Received!");
            } catch(e) { addMessageToFeed("Error connecting."); }
        }

        function openModal() { document.getElementById('modal-overlay').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "SENDING...";
            activateAI(faqVideoIds.thanks);
            closeModal();
            addMessageToFeed("Audit requested! Analyzing your site.");
        }
    </script>
</body>
</html>
