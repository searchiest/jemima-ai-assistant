<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jemima AI | Double Your Conversions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-anim { animation: slideIn 0.3s ease forwards; }

        #video-container {
            background-color: #000;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            width: 100%;
        }

        /* Iframe styling for smooth swapping */
        .yt-player-frame {
            width: 100% !important;
            height: 100% !important;
            position: absolute;
            top: 0;
            left: 0;
            border: 0;
            opacity: 0; /* Default hidden to prevent flashes */
            transition: opacity 0.6s ease-in-out;
            z-index: 10;
            pointer-events: none;
        }

        /* Class to show player when truly ready */
        .yt-player-frame.active {
            opacity: 1;
            z-index: 20;
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">

    <nav class="flex items-center justify-between px-4 lg:px-12 py-4 lg:py-5 bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="flex items-center gap-2 font-extrabold text-lg lg:text-xl tracking-tighter">
            <img src="jemima-logo.png" alt="Jemima Logo" class="w-6 h-6 lg:w-7 lg:h-7 rounded-full shadow-sm">
            <span>Jemima</span>
        </div>
        <div class="hidden md:flex gap-8 text-xs font-bold text-slate-500 uppercase tracking-widest">
            <a href="#" class="hover:text-[#c2155a]">Product</a>
            <a href="#" class="hover:text-[#c2155a]">Pricing</a>
            <a href="#" class="hover:text-[#c2155a]">Contact</a>
        </div>
        <button class="px-4 py-2 text-[10px] lg:text-xs font-black bg-[#c2155a] text-white rounded-none shadow-lg shadow-[#c2155a]/20 uppercase tracking-widest">Free Audit</button>
    </nav>

    <main class="max-w-[1200px] mx-auto px-4 lg:px-6 pt-2 lg:pt-8 pb-8 lg:pb-16">
        
        <div class="flex flex-col items-center space-y-4 lg:space-y-12 mb-6 lg:mb-20">
            <div class="max-w-4xl text-center space-y-4">
                <div class="inline-block bg-slate-900 text-white text-[7px] lg:text-[8px] font-bold px-3 py-1 lg:px-5 lg:py-1.5 uppercase tracking-[0.3em] shadow-lg">
                    100% Lead Capture Engine
                </div>
                <h1 class="text-2xl md:text-3xl lg:text-4xl font-[800] leading-tight text-slate-950">
                    Add Jemima to your site. <br> <span class="text-[#c2155a]">Increase Conversions.</span>
                </h1>
            </div>

            <div class="flex flex-col md:flex-row justify-center items-stretch gap-6 lg:gap-8 w-full max-w-5xl">
                
                <div class="w-full md:w-[45%] space-y-3">
                    <div id="video-container" class="relative aspect-video shadow-2xl border border-slate-200 overflow-hidden bg-black">
                        <!-- Dual Player Setup for Instant Transitions -->
                        <div id="idle-player-mount"></div>
                        <div id="interaction-player-mount"></div>

                        <!-- Interaction Overlay: Start with bg-black to hide iframe setup flash -->
                        <div id="video-placeholder" class="absolute inset-0 z-30 flex flex-col items-center justify-end pb-8 lg:pb-12 bg-black transition-colors duration-700 cursor-pointer" onclick="activateAI()">
                            <div id="interaction-ui" class="flex flex-col items-center gap-4 transition-all duration-300 opacity-0" style="transition-delay: 400ms">
                                <div class="bg-black/40 backdrop-blur-md px-6 py-3 rounded-full border border-white/20 text-white/90 text-[11px] font-black uppercase tracking-[0.2em] shadow-xl hover:bg-[#c2155a]/80 transition-colors">
                                    tap to interact
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white border border-slate-200 p-4 flex items-center justify-center gap-8 shadow-sm">
                        <div class="flex items-center gap-2 text-[9px] font-black uppercase tracking-wider cursor-pointer hover:text-[#c2155a]">
                            <div class="w-8 h-8 bg-slate-950 flex items-center justify-center text-white"><i class="fas fa-phone-alt"></i></div>
                            <span>Call Now</span>
                        </div>
                        <div class="flex items-center gap-2 text-[9px] font-black uppercase tracking-wider cursor-pointer hover:text-[#c2155a]">
                            <div class="w-8 h-8 bg-slate-950 flex items-center justify-center text-white"><i class="fas fa-sms"></i></div>
                            <span>SMS Now</span>
                        </div>
                    </div>

                    <div class="p-4 md:p-6 bg-white border border-slate-200 shadow-sm space-y-3">
                        <div class="flex flex-col gap-1.5">
                            <button onclick="playVideoAnswer('integration', this)" class="w-full py-2.5 text-[8px] md:text-[9px] font-black bg-white border text-slate-700 hover:text-[#c2155a] transition-all uppercase tracking-widest text-left px-4 shadow-sm active:scale-95">
                                <i class="fas fa-play-circle mr-2 text-[#c2155a]"></i> CRM & Calendar Integration?
                            </button>
                            <button onclick="playVideoAnswer('setup', this)" class="w-full py-2.5 text-[8px] md:text-[9px] font-black bg-white border text-slate-700 hover:text-[#c2155a] transition-all uppercase tracking-widest text-left px-4 shadow-sm active:scale-95">
                                <i class="fas fa-play-circle mr-2 text-[#c2155a]"></i> How fast is setup?
                            </button>
                        </div>
                    </div>
                </div>

                <div class="w-full md:w-[45%] bg-white border border-slate-200 shadow-xl flex flex-col justify-between">
                    <div class="p-4 md:p-6 space-y-4">
                        <div class="flex items-center justify-between border-b pb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-white flex items-center justify-center border relative overflow-hidden">
                                    <img src="jemima-chat-icon.png" alt="Jemima Avatar" class="w-full h-full object-cover">
                                    <div class="absolute -bottom-0.5 -right-0.5 w-2 h-2 bg-emerald-500 border border-white"></div>
                                </div>
                                <p class="text-[11px] font-black uppercase">Jemima</p>
                            </div>
                        </div>
                        <div id="chat-feed" class="space-y-3 h-[240px] md:h-[300px] overflow-y-auto chat-scroll pr-1 flex flex-col">
                            <div class="bg-[#c2155a] text-white p-3 text-[10px] md:text-[11px] font-medium leading-relaxed message-anim shadow-lg shadow-[#c2155a]/10 mb-2">
                                Hello! I'm Jemima. Tap a question below to hear my answer.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 bg-white border-t text-center grayscale opacity-30 mt-8">
        <div class="flex flex-wrap justify-center gap-8 text-xl font-black italic tracking-tighter">
            <span>TRADIEFLOW</span><span>CONSULT.IO</span><span>SAAS.CO</span><span>SPARK-TECH</span>
        </div>
    </footer>

    <script>
        const chatFeed = document.getElementById('chat-feed');
        const videoPlaceholder = document.getElementById('video-placeholder');
        const interactionUI = document.getElementById('interaction-ui');
        
        const idleVid = "ykrp1aY5nt8";
        const mainExplainer = "o4HWNsxUN_I";
        const faqVideoIds = {
            integration: "_JwQpA5KFCs", 
            setup: "CiR8xtyCMSU"
        };

        let idlePlayer;
        let interactionPlayer;
        let isInteracting = false;
        let playersReady = 0;

        function onYouTubeIframeAPIReady() {
            // Player 1: Idle Loop (Muted)
            idlePlayer = new YT.Player('idle-player-mount', {
                videoId: idleVid,
                playerVars: {
                    autoplay: 1,
                    mute: 1,
                    controls: 0,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0,
                    iv_load_policy: 3,
                    playsinline: 1,
                    loop: 1,
                    playlist: idleVid
                },
                events: {
                    onReady: (event) => {
                        event.target.getIframe().classList.add('yt-player-frame');
                        checkReady();
                    },
                    onStateChange: (event) => {
                        // Reveal the video only once it's actually playing to avoid black flash
                        if (event.data === YT.PlayerState.PLAYING && !isInteracting) {
                            event.target.getIframe().classList.add('active');
                            videoPlaceholder.classList.replace('bg-black', 'bg-transparent');
                            interactionUI.classList.remove('opacity-0');
                        }
                    }
                }
            });

            // Player 2: Interaction Player (Preloaded with Explainer)
            interactionPlayer = new YT.Player('interaction-player-mount', {
                videoId: mainExplainer,
                playerVars: {
                    autoplay: 0,
                    mute: 1, 
                    controls: 0,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0,
                    iv_load_policy: 3,
                    playsinline: 1
                },
                events: {
                    onReady: (event) => {
                        event.target.getIframe().classList.add('yt-player-frame');
                        // Pre-buffering: play/pause hiddenly
                        event.target.playVideo();
                        setTimeout(() => { 
                            if (!isInteracting) event.target.pauseVideo(); 
                        }, 600);
                        checkReady();
                    },
                    onStateChange: (event) => {
                        if (event.data === YT.PlayerState.ENDED && isInteracting) {
                            resetToLoop();
                        }
                    }
                }
            });
        }

        function checkReady() {
            playersReady++;
            if (playersReady === 2) {
                console.log("System Ready & Masked");
            }
        }

        function resetToLoop() {
            isInteracting = false;
            videoPlaceholder.style.display = 'flex';
            
            interactionPlayer.getIframe().classList.remove('active');
            idlePlayer.getIframe().classList.add('active');
            
            idlePlayer.playVideo();
        }

        function activateAI(vidId = mainExplainer) {
            if (playersReady < 2) return;

            isInteracting = true;
            videoPlaceholder.style.display = 'none';

            idlePlayer.pauseVideo();
            idlePlayer.getIframe().classList.remove('active');
            interactionPlayer.getIframe().classList.add('active');

            const currentVid = interactionPlayer.getVideoData().video_id;
            
            if (vidId !== currentVid) {
                interactionPlayer.loadVideoById({
                    videoId: vidId,
                    suggestedQuality: 'hd720'
                });
            }
            
            interactionPlayer.unMute();
            interactionPlayer.playVideo();
        }

        function playVideoAnswer(type, el) {
            const vidId = faqVideoIds[type];
            activateAI(vidId);

            const userMsg = document.createElement('div');
            userMsg.className = 'bg-slate-100 text-slate-700 p-3 text-[10px] md:text-[11px] font-bold self-end w-fit mb-2 border rounded-sm';
            userMsg.innerText = el.innerText.trim();
            chatFeed.appendChild(userMsg);

            const messages = {
                integration: ["I sync with Google, Outlook, and most CRMs instantly.", "No manual data entry required."],
                setup: ["Setup takes less than 15 minutes.", "Just paste one line of code onto your site."]
            };
            addMessages(messages[type]);
        }

        async function addMessages(msgArray) {
            for (const text of msgArray) {
                const typing = document.createElement('div');
                typing.className = 'bg-slate-50 text-slate-400 p-2 text-[9px] font-bold w-fit italic mb-2';
                typing.innerText = 'Jemima is responding...';
                chatFeed.appendChild(typing);
                chatFeed.scrollTop = chatFeed.scrollHeight;
                
                await new Promise(r => setTimeout(r, 1000));
                
                typing.remove();
                const msg = document.createElement('div');
                msg.className = 'bg-[#c2155a] text-white p-3 text-[10px] md:text-[11px] font-medium leading-relaxed message-anim shadow-lg shadow-[#c2155a]/10 mb-2';
                msg.innerText = text;
                chatFeed.appendChild(msg);
                chatFeed.scrollTop = chatFeed.scrollHeight;
            }
        }
    </script>
</body>
</html>
